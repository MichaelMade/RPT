name: iOS CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test RPT
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Build for simulator
        run: |
          set -euo pipefail
          xcodebuild \
            -project RPT.xcodeproj \
            -scheme RPT \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Run unit and UI smoke tests
        run: |
          set -euo pipefail
          xcodebuild test \
            -project RPT.xcodeproj \
            -scheme RPT \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults/RPT.xcresult

      - name: Upload xcresult bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: RPT-xcresult
          path: TestResults/RPT.xcresult
          if-no-files-found: ignore
